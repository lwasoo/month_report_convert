name: Build Desktop Packages

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build EXE
        shell: pwsh
        env:
          MONTH_REPORT_CONVERTER_VERSION: ${{ github.ref_name }}
        run: .\scripts\build_windows.ps1 -PythonExe python -AppName FileToolbox

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileToolbox-windows
          path: dist/v*-FileToolbox.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build app
        env:
          MONTH_REPORT_CONVERTER_VERSION: ${{ github.ref_name }}
        run: bash ./scripts/build_macos.sh

      - name: Zip macOS app
        run: |
          app_path="$(find dist -maxdepth 1 -name 'v*-FileToolbox.app' -type d | head -n 1)"
          if [ -z "$app_path" ]; then
            echo "No versioned app bundle found in dist" >&2
            exit 1
          fi
          versioned_name="$(basename "$app_path" .app)"
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "dist/${versioned_name}-macos.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: FileToolbox-macos
          path: dist/v*-FileToolbox-macos.zip

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs:
      - build-windows
      - build-macos
    runs-on: ubuntu-latest
    steps:
      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: FileToolbox-windows
          path: dist

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: FileToolbox-macos
          path: dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/v*-FileToolbox.exe
            dist/v*-FileToolbox-macos.zip
          generate_release_notes: true
